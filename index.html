<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RubyBox | Glass</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="left-color-bar"></div>
    <button id="menu-toggle" class="hamburger-btn">☰</button>
    <div id="sidebar-overlay" class="side-menu-overlay"></div>
    
    <aside id="sidebar" class="side-menu">
        <div class="logo-container"><span class="logo-text">RubyBox</span></div>
        <input type="password" id="api-key" placeholder="API Key" class="glass-input" style="margin-bottom: 15px;">
        <select id="model-select" class="glass-input" style="margin-bottom: 15px;">
            <option value="deepseek/deepseek-r1">DeepSeek R1</option>
            <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
            <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
        </select>
        <textarea id="system-prompt" class="glass-input" placeholder="System Directives..." style="height: 100px; margin-bottom: 15px;"></textarea>
        <textarea id="persistent-memory" class="glass-input" placeholder="Memory..." style="height: 100px; margin-bottom: 15px; border-color: rgba(254, 207, 239, 0.4);"></textarea>
        <div class="stats-panel">
            <div>Cost: <span id="cost-display">$0.00</span></div>
            <div id="status-badge">READY</div>
        </div>
        <button id="chars-btn" class="primary-btn" style="margin-bottom: 10px; background: rgba(255,255,255,0.05); color: #ffb6c1;">Vault</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button id="clear-btn" class="secondary-btn" style="color: #fb7185;">Purge</button>
            <button id="compress-btn" class="secondary-btn">Heal</button>
        </div>
        <button id="download-btn" class="secondary-btn" style="margin-top: 10px; width: 100%;">Export JSON</button>
    </aside>

    <main id="chat-wrapper">
        <div id="chat-log"></div>
        <div class="control-panel">
            <textarea id="prompt" class="glass-input" placeholder="Message..." rows="1"></textarea>
            <div class="btn-group">
                <button id="stop-btn" class="secondary-btn hidden">Stop</button>
                <button id="send-btn" class="primary-btn">Send</button>
            </div>
        </div>
    </main>

    <div id="charModal" class="modal-overlay">
        <div class="glass-panel">
            <button id="closeCharModal" class="close-btn">&times;</button>
            <h2>Vault</h2>
            <div id="char-list"></div>
            <input type="text" id="newCharName" class="glass-input" placeholder="Name" style="margin-bottom: 10px;">
            <textarea id="newCharPrompt" class="glass-input" placeholder="Directives" style="height: 80px; margin-bottom: 15px;"></textarea>
            <button id="saveCharBtn" class="primary-btn">Save to Vault</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
