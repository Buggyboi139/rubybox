<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RubyBox | Ultra-Harness</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button id="menu-toggle" class="glass-btn">☰</button>
    <aside id="sidebar" class="glass-panel">
        <div class="brand">RUBYBOX CLAW_V1</div>
        <input type="password" id="api-key" placeholder="OpenRouter API Key" class="glass-input">
        <select id="model-select" class="glass-input">
            <optgroup label="Logic/Thinking">
                <option value="deepseek/deepseek-r1">DeepSeek R1 (Thinking)</option>
                <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
            </optgroup>
            <optgroup label="High-Efficiency (Claw-Native)">
                <option value="deepseek/deepseek-chat">DeepSeek V3 (Cached)</option>
                <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
                <option value="meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B</option>
            </optgroup>
        </select>
        <textarea id="system-prompt" class="glass-input" placeholder="Core Directives..."></textarea>
        <textarea id="persistent-memory" class="glass-input" placeholder="Self-Healing Memory (Pinned Facts)..."></textarea>
        
        <div class="metrics">
            <div>Usage: <span id="cost-display">$0.0000</span></div>
            <div id="status-badge">READY</div>
        </div>

        <div class="action-grid">
            <button id="clear-btn" class="glass-btn danger">Purge</button>
            <button id="export-btn" class="glass-btn">Export</button>
            <button id="compress-btn" class="glass-btn">Heal</button>
        </div>
    </aside>

    <main id="chat-wrapper">
        <div id="chat-log"></div>
        <div id="input-container" class="glass-panel">
            <textarea id="prompt" placeholder="Set direction..."></textarea>
            <div class="input-actions">
                <button id="stop-btn" class="glass-btn hidden">STOP</button>
                <button id="send-btn" class="glass-btn">EXECUTE</button>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
