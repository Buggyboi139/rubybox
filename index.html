<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RubyBox | Glass</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="left-color-bar"></div>
    <button id="menu-toggle" class="hamburger-btn">☰</button>
    <div id="sidebar-overlay" class="side-menu-overlay"></div>
    
    <aside id="sidebar" class="side-menu">
        <div class="logo-container"><span class="logo-text">RubyBox</span></div>
        <input type="password" id="api-key" placeholder="API Key" class="glass-input" style="margin-bottom: 15px;">
        
        <select id="model-select" class="glass-input" style="margin-bottom: 15px;">
            <optgroup label="Anthropic">
                <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
                <option value="anthropic/claude-3-opus">Claude 3 Opus</option>
                <option value="anthropic/claude-3-haiku">Claude 3 Haiku</option>
            </optgroup>
            <optgroup label="Google">
                <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
                <option value="google/gemini-pro-1.5">Gemini 1.5 Pro</option>
                <option value="google/gemini-flash-1.5">Gemini 1.5 Flash</option>
            </optgroup>
            <optgroup label="OpenAI">
                <option value="openai/gpt-4o">GPT-4o</option>
                <option value="openai/gpt-4-turbo">GPT-4 Turbo</option>
                <option value="openai/gpt-3.5-turbo">GPT-3.5 Turbo</option>
            </optgroup>
            <optgroup label="DeepSeek">
                <option value="deepseek/deepseek-chat" selected>DeepSeek V3</option>
                <option value="deepseek/deepseek-r1">DeepSeek R1</option>
            </optgroup>
            <optgroup label="Meta">
                <option value="meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B</option>
                <option value="meta-llama/llama-3-8b-instruct">Llama 3 8B</option>
            </optgroup>
        </select>

        <div id="active-char-display" class="hidden">
            <img id="active-char-img" src="" alt="Avatar">
            <div id="active-char-name"></div>
            <button id="clear-char-btn">&times;</button>
        </div>

        <textarea id="system-prompt" class="glass-input" placeholder="System Directives..." style="height: 100px; margin-bottom: 15px;"></textarea>
        <textarea id="persistent-memory" class="glass-input" placeholder="Memory..." style="height: 100px; margin-bottom: 15px; border-color: rgba(254, 207, 239, 0.4);"></textarea>
        
        <div class="stats-panel">
            <div id="status-badge" style="color: #ffb6c1; font-weight: 700;">READY</div>
        </div>
        
        <button id="chars-btn" class="primary-btn" style="margin-bottom: 10px; background: rgba(255,255,255,0.05); color: #ffb6c1; border: 1px solid var(--border-highlight);">Characters Vault</button>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button id="clear-btn" class="secondary-btn" style="color: #fb7185; border-color: rgba(251, 113, 133, 0.3);">New Chat</button>
            <button id="compress-btn" class="secondary-btn">Heal</button>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <button id="download-btn" class="secondary-btn" style="width: 100%;">Export Vault</button>
            <button id="import-btn" class="secondary-btn" style="width: 100%;">Import Vault</button>
        </div>
        <input type="file" id="import-file" class="hidden" accept=".json,.enc">
    </aside>

    <main id="chat-wrapper">
        <div id="chat-log"></div>
        <div class="control-panel">
            <textarea id="prompt" class="glass-input" placeholder="Message..." style="height: 60px; resize: none; flex: 1;"></textarea>
            <div style="display: flex; flex-direction: column; gap: 5px; width: 100px;">
                <button id="stop-btn" class="secondary-btn hidden" style="flex: 1; color: #fb7185; border-color: rgba(251, 113, 133, 0.3); padding: 0;">Stop</button>
                <button id="send-btn" class="primary-btn" style="flex: 1; padding: 0;">Send</button>
            </div>
        </div>
    </main>

    <div id="charModal" class="modal-overlay">
        <div class="glass-panel">
            <button id="closeCharModal" class="close-btn">&times;</button>
            <h2 style="margin-bottom: 20px; font-size: 1.5rem;">Vault</h2>
            <div id="char-list" style="display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 25px; max-height: 250px; overflow-y: auto;"></div>
            <h3 style="margin-bottom: 15px; font-size: 1rem; color: var(--text-muted);">Create New</h3>
            <input type="text" id="newCharName" class="glass-input" placeholder="Character Name" style="margin-bottom: 10px;">
            <input type="text" id="newCharAvatar" class="glass-input" placeholder="Avatar Image URL (Optional)" style="margin-bottom: 10px;">
            <textarea id="newCharPrompt" class="glass-input" placeholder="System Directives / Persona" style="height: 100px; margin-bottom: 15px;"></textarea>
            <button id="saveCharBtn" class="primary-btn" style="width: 100%;">Save to Vault</button>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
